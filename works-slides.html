<script>
  // 直開き（standalone）対策:
  // カスタム要素のconnectedCallbackは子要素（island）のパース前に走ることがあり、
  // その場合initが黙って中断してナビが出ない。load後にinitを再実行する。
  window.addEventListener("load", function () {
    var deck = document.querySelector("hyperframes-slideshow");
    if (!deck) return;
    setTimeout(function () {
      var hasNav = deck.querySelector("button");
      if (!hasNav && typeof deck.init === "function") {
        deck.initInFlight = false;
        deck.init();
      }
      deck.focus();
    }, 400);
  });
</script>
