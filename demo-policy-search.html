<div class="hero"><div class="container"><span class="tag">EXPERIENCE DEMO</span><h1>「規程どこ？」を、<em>10秒</em>で。</h1><p>稟議・就業規則・社内ルールを横断検索。回答には条文の出典を付けます。</p></div></div>

  <div class="panel"><div class="panel-head">規程検索（サンプル）</div><div class="panel-body">
    <div class="row" id="chips"><button type="button" class="chip active" data-i="0">有給の申請方法</button><button type="button" class="chip" data-i="1">10万円超の稟議</button><button type="button" class="chip" data-i="2">在宅勤務ルール</button></div>

<section class="cta"><div class="container"><h2>御社仕様で構築する</h2><p style="color:var(--gray);margin:10px 0 20px">デモは入口です。本番は御社の業務フローに合わせて設計・定着まで伴走します。</p><a href="index.html?from=demo-policy-search#contact" class="btn btn-navy">無料相談を予約 →</a></div></section>

<script>
const outputs = [
    '回答: 有給は事前申請。3日前までに上長承認。\n出典: 就業規則 第12条',
    '回答: 10万円超は部長→役員の2段階稟議。\n出典: 稟議規程 別表1',
    '回答: 週2日まで。コアタイム10-15時。\n出典: テレワーク規程 第3条'
];
const out = document.getElementById('out');
const chips = document.querySelectorAll('.chip');
function show(i){ out.textContent = outputs[i]; chips.forEach((c,j)=>c.classList.toggle('active', j===i)); }
chips.forEach(c=>c.addEventListener('click',()=>show(Number(c.dataset.i))));
show(0);
</script>
