  var state = { mode: 'desks', ind: 'all' };
  var indChips = document.getElementById('ind-chips');
  var modeTabs = document.getElementById('mode-tabs');
  var cardGrid = document.getElementById('card-grid');
  var modeLead = document.getElementById('mode-lead');
  var flagshipSlot = document.getElementById('flagship-slot');
  var flagshipSection = document.getElementById('flagship-section');
  var shelfCap = document.querySelector('.shelf-cap');
  var byId = {};
  CATALOG.forEach(function(item){ byId[item.id] = item; });

  function indById(id){ return INDUSTRIES.find(function(x){ return x.id === id; }) || INDUSTRIES[0]; }
  function modeById(id){ return MODES.find(function(x){ return x.id === id; }) || MODES[0]; }

  function matchesIndustry(item, indId){
    if (indId === 'all') return true;
    var ind = indById(indId);
    return item.industry.some(function(tag){ return ind.tags.indexOf(tag) !== -1; });
  }

  function currentFlagship(){
    var id = FLAGSHIP_BY_IND[state.ind] || FLAGSHIP_BY_IND.all;
    return byId[id] || byId.kawasu;
  }

  function renderFlagship(){
    var item = currentFlagship();
    if (!item) { flagshipSlot.innerHTML = ''; return; }
    flagshipSlot.innerHTML =
      '<a class="flagship-card" href="' + item.href + '" style="--accent:' + item.accent + '">' +
      '<div class="flagship-visual"><span class="flagship-accent"></span>' +
      '<img src="' + item.thumb + '" alt="" loading="eager">' +
      '<span class="flagship-badge">旗艦デスク</span></div>' +
      '<div class="flagship-body">' +
      '<span class="flagship-en">' + item.en + '</span>' +
      '<h2>' + item.title + '</h2>' +
      '<span class="flagship-paradigm">' + item.paradigm + '</span>' +
      '<p class="flagship-desc">' + item.desc + '</p>' +
      '<span class="flagship-cta">' + item.cta + '</span>' +
      '</div></a>';
  }

  function buildHash(){
    if (state.ind === 'all') return '#' + state.mode;
    return '#' + state.mode + '/' + state.ind;
  }

  function parseRoute(){
    var params = new URLSearchParams(location.search);
    var qInd = params.get('ind');
    if (qInd && indById(qInd).id === qInd) state.ind = qInd;

    var raw = (location.hash || '').replace(/^#/, '');
    if (!raw) return;

    var parts = raw.split('/').filter(Boolean);
    /* 旧 #stories は desks へフォールバック */
    if (parts[0] === 'stories') parts[0] = 'desks';
    if (parts[0] && modeById(parts[0]).id === parts[0]) state.mode = parts[0];
    if (parts[1] && indById(parts[1]).id === parts[1]) state.ind = parts[1];
  }

  function syncUrl(replace){
    var next = buildHash();
    if (location.hash === next) return;
    var fn = replace ? 'replaceState' : 'pushState';
    history[fn]({ mode: state.mode, ind: state.ind }, '', next + location.search.replace(/(\?|&)ind=[^&]*/g, function(m, p){ return p === '?' ? '?' : ''; }).replace(/\?$/, ''));
  }

  function renderControls(){
    indChips.innerHTML = INDUSTRIES.map(function(ind){
      return '<button type="button" class="chip' + (state.ind === ind.id ? ' active' : '') + '" data-ind="' + ind.id + '">' + ind.label + '</button>';
    }).join('');

    modeTabs.innerHTML = MODES.map(function(m){
      return '<button type="button" class="mode-tab' + (state.mode === m.id ? ' active' : '') + '" role="tab" aria-selected="' + (state.mode === m.id) + '" data-mode="' + m.id + '">' + m.label + '<small>' + m.sub + '</small></button>';
    }).join('');
  }

  function cardHtml(item, compact){
    var badgeClass = item.badgeClass ? ' ' + item.badgeClass : '';
    var tags = item.industry.map(function(t){ return '<span>' + t + '</span>'; }).join('');
    return '<a class="lab-card" href="' + item.href + '" style="--accent:' + item.accent + '">' +
      '<div class="lab-visual"><span class="lab-accent"></span>' +
      '<img src="' + item.thumb + '" alt="" loading="lazy">' +
      '<span class="lab-badge' + badgeClass + '">' + item.badge + '</span></div>' +
      '<div class="lab-body">' +
      '<span class="lab-en">' + item.en + '</span>' +
      '<h3>' + item.title + '</h3>' +
      '<span class="lab-paradigm">' + item.paradigm + '</span>' +
      (compact ? '' : '<p class="lab-desc">' + item.desc + '</p>') +
      (compact ? '' : '<div class="lab-tags">' + tags + '</div>') +
      '<span class="lab-cta">' + item.cta + '</span>' +
      '</div></a>';
  }

  function featureHtml(item){
    var badgeClass = item.badgeClass ? ' ' + item.badgeClass : '';
    return '<a class="studio-feature" href="' + item.href + '" style="--accent:' + item.accent + '">' +
      '<div class="lab-visual"><span class="lab-accent"></span>' +
      '<img src="' + item.thumb + '" alt="" loading="lazy">' +
      '<span class="lab-badge' + badgeClass + '">見本</span></div>' +
      '<div class="lab-body">' +
      '<span class="lab-en">' + item.en + '</span>' +
      '<h3>' + item.title + '</h3>' +
      '<span class="lab-paradigm">' + item.paradigm + '</span>' +
      '<p class="lab-desc">' + item.desc + '</p>' +
      '<span class="lab-cta">' + item.cta + '</span>' +
      '</div></a>';
  }

  function renderStudio(items){
    var html = '<div class="studio">';
    var any = false;
    CRAFT_FAMILIES.forEach(function(fam){
      var list = items.filter(function(i){ return i.family === fam.id; });
      if (!list.length) return;
      any = true;
      var feature = list.find(function(i){ return i.id === fam.feature; }) || list[0];
      var rest = list.filter(function(i){ return i.id !== feature.id; });
      html += '<div class="studio-fam"><div class="studio-fam-head">' +
        '<div class="k">' + fam.kicker + '</div><h3>' + fam.label + '</h3><p>' + fam.lead + '</p></div>' +
        '<div class="studio-fam-body">' + featureHtml(feature) +
        '<div class="studio-side">' + (rest.length ? rest.map(function(i){ return cardHtml(i, true); }).join('') : '<p style="font-size:13px;color:var(--gray);padding:12px;">この業種の追加実物は見本のみです。</p>') +
        '</div></div></div>';
    });
    html += '</div>';
    if (!any) {
      cardGrid.innerHTML = '<div class="empty-state"><h3>該当する成果物がありません</h3><p>業種を「すべて」に戻すか、別の業種を選んでください。</p><button type="button" class="chip active" id="reset-filter">すべての業種を表示</button></div>';
      var reset = document.getElementById('reset-filter');
      if (reset) reset.addEventListener('click', function(){ setInd('all', true); });
      return;
    }
    cardGrid.innerHTML = html;
  }

  function renderCards(){
    var mode = modeById(state.mode);
    modeLead.innerHTML = mode.lead;
    var flag = currentFlagship();
    var showFlag = state.mode === 'desks';
    flagshipSection.style.display = showFlag ? '' : 'none';
    if (shelfCap) {
      shelfCap.textContent = state.mode === 'craft' ? '成果物 Studio' : (showFlag ? '同じ棚のほかの実物' : '実物一覧');
    }

    var items = CATALOG.filter(function(item){
      if (item.mode !== state.mode || !matchesIndustry(item, state.ind)) return false;
      if (state.mode === 'desks' && flag && item.id === flag.id) return false;
      return true;
    });

    if (state.mode === 'craft') {
      renderStudio(items);
      return;
    }

    if (!items.length) {
      cardGrid.innerHTML = '<div class="empty-state"><h3>該当する実物がありません</h3><p>この業種 × モードの組み合わせでは、まだカードを置いていません。</p><button type="button" class="chip active" id="reset-filter">すべての業種を表示</button></div>';
      var reset = document.getElementById('reset-filter');
      if (reset) reset.addEventListener('click', function(){ setInd('all', true); });
      return;
    }

    cardGrid.className = 'card-grid';
    cardGrid.innerHTML = items.map(function(item){ return cardHtml(item, false); }).join('');
  }

  var HERO = {
    desks: { title: 'まず、この1本。', lead: '業種ごとの旗艦デスクを最上段に。下の棚で同じ系統の机を比べられます。' },
    shots: { title: 'まず、1発で試す。', lead: '登録不要のワンショット。深い机と同型の主語で、短く体感できます。' },
    craft: { title: '作った物を、種類で見る。', lead: '道具・文書・映像・空間。カード一列ではなく、種類ごとの骨格で見せます。' }
  };

  function renderHero(){
    var h = HERO[state.mode] || HERO.desks;
    var t = document.getElementById('hero-title');
    var l = document.getElementById('hero-lead');
    if (t) t.textContent = h.title;
    if (l) l.textContent = h.lead;
  }

  function renderAll(replace){
    renderControls();
    renderHero();
    renderFlagship();
    renderCards();
    syncUrl(replace);
  }

  function setMode(mode, replace){
    if (!modeById(mode)) return;
    state.mode = mode;
    renderAll(replace);
  }

  function setInd(ind, replace){
    if (!indById(ind)) return;
    state.ind = ind;
    renderAll(replace);
  }

  indChips.addEventListener('click', function(e){
    var btn = e.target.closest('[data-ind]');
    if (!btn) return;
    setInd(btn.dataset.ind, false);
  });

  modeTabs.addEventListener('click', function(e){
    var btn = e.target.closest('[data-mode]');
    if (!btn) return;
    setMode(btn.dataset.mode, false);
  });

  window.addEventListener('popstate', function(){
    if (history.state && history.state.mode) {
      state.mode = history.state.mode;
      state.ind = history.state.ind || 'all';
    } else {
      parseRoute();
    }
    renderControls();
    renderHero();
    renderFlagship();
    renderCards();
  });

  window.addEventListener('hashchange', function(){
    parseRoute();
    renderControls();
    renderHero();
    renderFlagship();
    renderCards();
  });

  parseRoute();
  renderAll(true);
})();
</script>
