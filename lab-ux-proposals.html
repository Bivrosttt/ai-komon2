<!-- 2026-07-22: 実物ラボのUX/UI案を選択できる提案プレビュー（本番lab非改変） -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実物ラボ UX/UI 提案｜選択プレビュー</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B2447; --navy-deep: #071A35; --ink: #162033; --muted: #5A6A7E;
    --line: #D5DEE8; --soft: #EEF3F8; --white: #fff; --gold: #C9A227; --blue: #2D6CB5;
    --ok: #15803D; --warn: #B45309;
    --rail: 320px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans JP', sans-serif; color: var(--ink); background: #E8EEF5;
    min-height: 100vh;
  }
  h1, h2, h3 { font-family: 'Shippori Mincho', serif; font-weight: 700; line-height: 1.35; }
  button, a { font-family: inherit; }
  img { display: block; max-width: 100%; }

  .shell { display: grid; grid-template-columns: var(--rail) 1fr; min-height: 100vh; }
  .rail {
    background: var(--navy-deep); color: #D7E0EC; padding: 22px 18px 28px;
    position: sticky; top: 0; height: 100vh; overflow: auto;
  }
  .rail-kicker { font-size: 11px; letter-spacing: .18em; color: var(--gold); font-weight: 700; }
  .rail h1 { color: #fff; font-size: 22px; margin: 8px 0 10px; }
  .rail-lead { font-size: 12.5px; line-height: 1.7; color: #9FB0C7; margin-bottom: 18px; }
  .rail a.back { color: #9EC0EA; font-size: 12px; font-weight: 600; text-decoration: none; }
  .rail a.back:hover { text-decoration: underline; }

  .concept-list { display: flex; flex-direction: column; gap: 8px; margin: 18px 0; }
  .concept-btn {
    text-align: left; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04);
    color: #E8EEF5; border-radius: 8px; padding: 12px 12px 11px; cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .concept-btn:hover { background: rgba(255,255,255,.08); }
  .concept-btn.active { background: rgba(201,162,39,.16); border-color: var(--gold); }
  .concept-btn .id { font-size: 10px; letter-spacing: .14em; color: var(--gold); font-weight: 700; }
  .concept-btn .name { display: block; font-size: 14px; font-weight: 700; margin: 4px 0 2px; color: #fff; }
  .concept-btn .blurb { font-size: 11.5px; line-height: 1.55; color: #9FB0C7; }

  .pick-box {
    margin-top: 8px; padding: 14px; border-radius: 8px; background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.1);
  }
  .pick-box label { font-size: 11px; letter-spacing: .1em; color: var(--gold); font-weight: 700; }
  .pick-box select, .pick-box textarea {
    width: 100%; margin-top: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.06); color: #fff; padding: 10px; font: inherit; font-size: 12.5px;
  }
  .pick-box textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
  .pick-actions { display: flex; gap: 8px; margin-top: 10px; }
  .pick-actions button {
    flex: 1; border: none; border-radius: 6px; padding: 10px; font-weight: 700; font-size: 12.5px; cursor: pointer;
  }
  .btn-gold { background: var(--gold); color: var(--navy-deep); }
  .btn-ghost { background: transparent; color: #D7E0EC; border: 1px solid rgba(255,255,255,.25) !important; }

  .stage { padding: 20px 22px 40px; }
  .stage-bar {
    display: flex; flex-wrap: wrap; gap: 12px 18px; align-items: flex-start; justify-content: space-between;
    margin-bottom: 14px;
  }
  .stage-meta h2 { font-size: 24px; color: var(--navy); }
  .stage-meta p { font-size: 13.5px; color: var(--muted); max-width: 720px; margin-top: 6px; line-height: 1.7; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
    background: var(--soft); color: var(--navy); border: 1px solid var(--line);
  }
  .tag.pro { background: #ECFDF3; color: var(--ok); border-color: #BBF7D0; }
  .tag.con { background: #FFF7ED; color: var(--warn); border-color: #FED7AA; }

  .frame-wrap {
    background: #0E1B2E; border-radius: 14px; padding: 14px; box-shadow: 0 18px 50px rgba(7,26,53,.18);
  }
  .frame-chrome {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px; color: #8FA3BC; font-size: 11px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #FF5F57; } .dot.y { background: #FEBC2E; } .dot.g { background: #28C840; }
  .frame {
    background: #fff; border-radius: 8px; overflow: hidden; min-height: 720px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .preview { min-height: 720px; }

  /* shared preview tokens */
  .p-header {
    height: 52px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.96);
  }
  .p-logo { font-family: 'Shippori Mincho', serif; font-weight: 700; color: var(--navy); font-size: 16px; }
  .p-nav { display: flex; gap: 14px; font-size: 11.5px; color: var(--blue); font-weight: 600; }
  .p-cta {
    background: var(--gold); color: var(--navy-deep); font-weight: 700; font-size: 11.5px;
    padding: 7px 12px; border-radius: 4px;
  }
  .p-hero {
    background: linear-gradient(135deg, #071A35, #0B2447 55%, #19376D);
    color: #fff; padding: 36px 28px 30px;
  }
  .p-hero .k { font-size: 10px; letter-spacing: .18em; color: var(--gold); font-weight: 700; }
  .p-hero h3 { font-size: 26px; margin: 8px 0 8px; }
  .p-hero p { color: #B8C7DA; font-size: 12.5px; max-width: 520px; line-height: 1.65; }
  .p-controls { background: var(--soft); border-bottom: 1px solid var(--line); padding: 14px 20px; }
  .p-label { font-size: 10px; letter-spacing: .12em; color: var(--muted); font-weight: 700; margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 5px 11px;
    font-size: 11.5px; font-weight: 700; color: var(--ink);
  }
  .chip.on { background: var(--navy); color: #fff; border-color: var(--navy); }
  .tabs { display: flex; gap: 4px; margin-top: 10px; }
  .tab {
    padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--muted); border-bottom: 2px solid transparent;
  }
  .tab.on { color: var(--navy); border-bottom-color: var(--gold); background: #fff; border-radius: 6px 6px 0 0; }
  .p-body { padding: 20px; background: #fff; }
  .lead { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; line-height: 1.65; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
  .thumb {
    aspect-ratio: 16/10; position: relative;
    background:
      linear-gradient(160deg, rgba(7,26,53,.55), rgba(7,26,53,.1)),
      radial-gradient(circle at 20% 30%, rgba(201,162,39,.35), transparent 40%),
      linear-gradient(135deg, #1a3558, #0d213f);
  }
  .thumb.teal { background: linear-gradient(135deg, #0F766E, #115E59); }
  .thumb.amber { background: linear-gradient(135deg, #A16207, #713F12); }
  .thumb.orange { background: linear-gradient(135deg, #C2410C, #7C2D12); }
  .thumb.blue { background: linear-gradient(135deg, #1D4ED8, #1E3A8A); }
  .thumb.sky { background: linear-gradient(135deg, #0284C7, #0C4A6E); }
  .badge {
    position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 700;
    background: var(--navy); color: #fff; padding: 3px 8px; border-radius: 999px;
  }
  .badge.gold { background: var(--gold); color: var(--navy-deep); }
  .card-b { padding: 11px 12px 13px; }
  .en { font-size: 9.5px; letter-spacing: .1em; font-weight: 700; color: var(--blue); }
  .card-b h4 { font-size: 14px; color: var(--navy); margin: 2px 0 4px; }
  .para { font-size: 10px; font-weight: 700; background: var(--soft); display: inline-block; padding: 2px 7px; border-radius: 3px; }
  .desc { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.55; }
  .cta { font-size: 11.5px; font-weight: 700; color: var(--gold); margin-top: 8px; }

  /* A baseline — already covered by shared */

  /* B pairing */
  .pair {
    display: grid; grid-template-columns: 1.2fr .9fr; gap: 0; border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; margin-bottom: 12px; background: #fff;
  }
  .pair-main { display: grid; grid-template-columns: 1.1fr 1fr; min-height: 168px; }
  .pair-main .thumb { aspect-ratio: auto; min-height: 168px; }
  .pair-side {
    border-left: 1px dashed var(--line); background: #FAFBFD; padding: 14px 14px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .pair-side .mini {
    display: grid; grid-template-columns: 56px 1fr; gap: 10px; align-items: center;
    border: 1px solid var(--line); border-radius: 7px; overflow: hidden; background: #fff;
  }
  .pair-side .mini .thumb { aspect-ratio: 1; min-height: 56px; }
  .pair-side .mini .t { font-size: 12px; font-weight: 700; color: var(--navy); }
  .pair-side .mini .s { font-size: 10.5px; color: var(--muted); }
  .pair-link { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--muted); }

  /* C quality gate */
  .tier-label {
    display: flex; align-items: center; justify-content: space-between; margin: 6px 0 10px;
  }
  .tier-label strong { font-size: 13px; color: var(--navy); }
  .tier-label span { font-size: 11px; color: var(--muted); font-weight: 600; }
  .more-fake {
    margin-top: 14px; border: 1px dashed var(--line); border-radius: 8px; padding: 12px 14px;
    background: var(--soft); display: flex; justify-content: space-between; align-items: center;
  }
  .more-fake strong { font-size: 13px; color: var(--navy); }
  .more-fake span { font-size: 11.5px; color: var(--muted); }

  /* D deep/light */
  .two-lane { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .lane-col { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .lane-h {
    padding: 12px 14px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #F8FAFC, #EEF3F8);
  }
  .lane-h .k { font-size: 10px; letter-spacing: .14em; color: var(--gold); font-weight: 700; }
  .lane-h h4 { font-size: 16px; color: var(--navy); margin-top: 2px; }
  .lane-b { padding: 12px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
  .lane-b .card { display: grid; grid-template-columns: 88px 1fr; }
  .lane-b .thumb { aspect-ratio: 1; }

  /* E hero fixed */
  .hero-flag {
    display: grid; grid-template-columns: 1.25fr 1fr; border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; margin-bottom: 16px;
  }
  .hero-flag .thumb { min-height: 220px; aspect-ratio: auto; }
  .hero-flag .card-b { padding: 22px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .hero-flag h4 { font-size: 24px; }
  .section-cap { font-size: 11px; letter-spacing: .14em; font-weight: 700; color: var(--muted); margin: 4px 0 10px; }

  /* F case-first */
  .case-stage {
    display: grid; grid-template-columns: 220px 1fr; gap: 14px; min-height: 420px;
  }
  .case-nav { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fff; }
  .case-nav button {
    width: 100%; text-align: left; border: none; border-bottom: 1px solid var(--line);
    background: #fff; padding: 12px; cursor: pointer;
  }
  .case-nav button.on { background: var(--navy); color: #fff; }
  .case-nav .no { font-size: 10px; letter-spacing: .1em; font-weight: 700; opacity: .7; }
  .case-nav .tt { display: block; font-size: 13px; font-weight: 700; margin-top: 2px; }
  .theater {
    border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 16px;
  }
  .scrub {
    height: 8px; border-radius: 999px; background: #E2E8F0; position: relative; margin: 14px 0 18px;
  }
  .scrub i {
    position: absolute; left: 62%; top: -5px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .ba { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ba .panel { border: 1px solid var(--line); border-radius: 8px; padding: 12px; min-height: 150px; }
  .ba .panel.before { background: #FFF7F7; }
  .ba .panel.after { background: #F0FDF4; }
  .ba .panel .l { font-size: 10px; font-weight: 700; letter-spacing: .1em; margin-bottom: 8px; }
  .ba .panel .l.bad { color: #B91C1C; }
  .ba .panel .l.good { color: #15803D; }
  .line { height: 8px; border-radius: 4px; background: #E2E8F0; margin-bottom: 8px; }
  .line.w60 { width: 60%; } .line.w80 { width: 80%; } .line.alert { background: #FECACA; }
  .line.ok { background: #86EFAC; }
  .jump { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .jump a {
    font-size: 11.5px; font-weight: 700; padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--soft); color: var(--navy); text-decoration: none;
  }
  .jump a.pri { background: var(--navy); color: #fff; border-color: var(--navy); }

  .handoff {
    margin-top: 16px; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px;
  }
  .handoff h3 { font-size: 15px; color: var(--navy); margin-bottom: 6px; }
  .handoff p { font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
  .handoff pre {
    background: #0B2447; color: #D7E0EC; border-radius: 8px; padding: 12px; font-size: 12px;
    overflow: auto; line-height: 1.55; white-space: pre-wrap;
  }

  @media (max-width: 980px) {
    .shell { grid-template-columns: 1fr; }
    .rail { position: relative; height: auto; }
    .grid, .two-lane, .pair, .pair-main, .hero-flag, .case-stage, .ba { grid-template-columns: 1fr; }
    .pair-side { border-left: none; border-top: 1px dashed var(--line); }
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="rail">
    <div class="rail-kicker">PROPOSAL BOARD</div>
    <h1>実物ラボ<br>UX/UI案</h1>
    <p class="rail-lead">本番の <code style="color:#E8C76A">lab.html</code> は触っていません。案を切り替えて見た目を比較し、推しを選んでください。</p>
    <a class="back" href="lab.html">← いまの lab.html を見る</a>

    <div class="concept-list" id="concept-list"></div>

    <div class="pick-box">
      <label>推しを選ぶ</label>
      <select id="pick-select"></select>
      <label style="display:block;margin-top:12px;">コメント（任意）</label>
      <textarea id="pick-note" placeholder="例：ペアリングが一番関係性がわかる。Deep/Lightは単純すぎるかも。"></textarea>
      <div class="pick-actions">
        <button type="button" class="btn-gold" id="save-pick">この案で決定</button>
        <button type="button" class="btn-ghost" id="copy-pick">JSONコピー</button>
      </div>
    </div>
  </aside>

  <main class="stage">
    <div class="stage-bar">
      <div class="stage-meta">
        <h2 id="stage-title">—</h2>
        <p id="stage-desc">—</p>
        <div class="tags" id="stage-tags"></div>
      </div>
    </div>

    <div class="frame-wrap">
      <div class="frame-chrome">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span id="frame-url">lab.html · preview</span>
      </div>
      <div class="frame">
        <div class="preview" id="preview"></div>
      </div>
    </div>

    <div class="handoff">
      <h3>Handoff</h3>
      <p>選んだ案をこのJSONで返してくれれば、本番 lab に寄せて実装する。</p>
      <pre id="handoff-json">{}</pre>
    </div>
  </main>
</div>

<script>
(function(){
  var CONCEPTS = [
    {
      id: 'A-baseline',
      name: '現行ベース（モード×カード）',
      blurb: '業種チップ＋4モード。いまのlabに近い比較基準。',
      title: 'A. 現行ベース',
      desc: '業種とモードで切るフラットなカード棚。わかりやすいが、深/軽の関係と品質差が同列になる。',
      tags: [
        { t: '比較基準', c: '' },
        { t: '長所: 既知', c: 'pro' },
        { t: '短所: 倉庫感', c: 'con' }
      ],
      render: renderBaseline
    },
    {
      id: 'B-pairing',
      name: 'ペアリング棚',
      blurb: 'Desk × 同型Shot を1ユニット。関係性が先に見える。',
      title: 'B. ペアリング棚',
      desc: '旗艦デスクの隣に同型の1発デモをセットで出す。触る深さの階段がユニット単位で伝わる。',
      tags: [
        { t: '推し候補', c: 'pro' },
        { t: '長所: 関係が明確', c: 'pro' },
        { t: '短所: 実装やや重い', c: 'con' }
      ],
      render: renderPairing
    },
    {
      id: 'C-quality',
      name: '品質ゲート（A/B）',
      blurb: 'UIは現行のまま。表に出すAと折りたたみBだけ分ける。',
      title: 'C. 品質ゲート',
      desc: '見た目は大きく変えず、編集判断で「表に出す」を制限。階層UIの失敗を避けつつ倉庫感だけ削る。',
      tags: [
        { t: '推し候補', c: 'pro' },
        { t: '長所: 破壊が少ない', c: 'pro' },
        { t: '短所: 編集運用が本体', c: 'con' }
      ],
      render: renderQuality
    },
    {
      id: 'D-deeplight',
      name: 'Deep / Light 2レーン',
      blurb: 'モード4つをやめて、深い机と軽い体験だけ。',
      title: 'D. Deep / Light',
      desc: '認知を2択に圧縮。stories/craftは各カードの関連リンクか「もっと」へ退避。',
      tags: [
        { t: '単純明快', c: 'pro' },
        { t: '短所: craftが弱い', c: 'con' }
      ],
      render: renderDeepLight
    },
    {
      id: 'E-hero',
      name: '固定ヒーロー＋棚',
      blurb: '最上段に編集固定の旗艦1本。下は現行グリッド。',
      title: 'E. 固定ヒーロー',
      desc: 'Wow不足の最短手当。運用で腐りやすいので、更新ルールが必要。',
      tags: [
        { t: '手早い', c: 'pro' },
        { t: '短所: 腐る', c: 'con' }
      ],
      render: renderHero
    },
    {
      id: 'F-case',
      name: 'Case-first',
      blurb: '入口を90日スクラブに。そこからdesk/demoへ飛ぶ。',
      title: 'F. Case-first',
      desc: '「変化」で売る導線。「今すぐ触りたい」人には遠回りになりやすい。',
      tags: [
        { t: 'ストーリー売り', c: 'pro' },
        { t: '短所: 触るまで遠い', c: 'con' }
      ],
      render: renderCase
    }
  ];

  var state = {
    active: localStorage.getItem('labUxProposalActive') || 'B-pairing',
    pick: localStorage.getItem('labUxProposalPick') || 'B-pairing',
    note: localStorage.getItem('labUxProposalNote') || ''
  };

  var list = document.getElementById('concept-list');
  var preview = document.getElementById('preview');
  var pickSelect = document.getElementById('pick-select');
  var pickNote = document.getElementById('pick-note');
  pickNote.value = state.note;

  function byId(id){ return CONCEPTS.find(function(c){ return c.id === id; }) || CONCEPTS[0]; }

  function headerHtml(){
    return '<div class="p-header"><div class="p-logo">AI顧問室</div><div class="p-nav"><span>実物ラボ</span><span>公式サイト</span><span class="p-cta">無料相談</span></div></div>';
  }

  function heroHtml(title, lead){
    return '<div class="p-hero"><div class="k">MATERIAL LAB · PREVIEW</div><h3>' + title + '</h3><p>' + lead + '</p></div>';
  }

  function chipsHtml(active){
    var items = ['すべて','建設','不動産','営業','管理','横断'];
    return '<div class="chips">' + items.map(function(x){
      return '<span class="chip' + (x === active ? ' on' : '') + '">' + x + '</span>';
    }).join('') + '</div>';
  }

  function card(opts){
    return '<div class="card">' +
      '<div class="thumb ' + (opts.tone || '') + '"><span class="badge' + (opts.gold ? ' gold' : '') + '">' + opts.badge + '</span></div>' +
      '<div class="card-b"><div class="en">' + opts.en + '</div><h4>' + opts.title + '</h4>' +
      '<span class="para">' + opts.para + '</span>' +
      (opts.desc ? '<p class="desc">' + opts.desc + '</p>' : '') +
      '<div class="cta">' + opts.cta + '</div></div></div>';
  }

  function renderBaseline(){
    return headerHtml() +
      heroHtml('実物を見る。', '触る机・1発デモ・90日・制作物を、業種とモードで切り替えます。') +
      '<div class="p-controls"><div class="p-label">業種</div>' + chipsHtml('建設') +
      '<div class="tabs"><span class="tab on">desks<small style="display:block;font-size:9px;opacity:.7">触る机</small></span><span class="tab">shots</span><span class="tab">stories</span><span class="tab">craft</span></div></div>' +
      '<div class="p-body"><p class="lead"><b>触る机</b> — ログインして全画面操作できる業務SaaS級デモ。</p><div class="grid">' +
      card({tone:'amber', badge:'ログインして触る', en:'ゲンバ', title:'GENBA', para:'主語：マップ', desc:'現場ピンを主語に点検→是正→日報。', cta:'▶ ログインして触る'}) +
      card({tone:'', badge:'ログインして触る', en:'タテル', title:'TATERU', para:'主語：週カレンダー', desc:'案件カードから完工→請求ドラフト。', cta:'▶ ログインして触る'}) +
      card({tone:'orange', badge:'ログインして触る', en:'ハンキョウ', title:'HANKYO', para:'主語：SLA', desc:'反響の取りこぼしを可視化。', cta:'▶ ログインして触る'}) +
      '</div></div>';
  }

  function renderPairing(){
    function pair(main, shots){
      return '<div class="pair"><div class="pair-main">' +
        '<div class="thumb ' + main.tone + '"><span class="badge gold">旗艦</span></div>' +
        '<div class="card-b"><div class="en">' + main.en + '</div><h4>' + main.title + '</h4>' +
        '<span class="para">' + main.para + '</span><p class="desc">' + main.desc + '</p>' +
        '<div class="cta">' + main.cta + '</div></div></div>' +
        '<div class="pair-side"><div class="pair-link">同型の1発体験</div>' +
        shots.map(function(s){
          return '<div class="mini"><div class="thumb ' + s.tone + '"></div><div><div class="t">' + s.title + '</div><div class="s">' + s.s + '</div></div></div>';
        }).join('') +
        '</div></div>';
    }
    return headerHtml() +
      heroHtml('机と、同型の1発をセットで。', '深さと手軽さの関係を、カード単体ではなくユニットで見せます。') +
      '<div class="p-controls"><div class="p-label">業種</div>' + chipsHtml('建設') + '</div>' +
      '<div class="p-body">' +
      pair(
        {tone:'amber', en:'ゲンバ', title:'GENBA', para:'主語：マップ', desc:'現場マップ上のピンを主語に、点検→是正→日報→出来高。', cta:'▶ ログインして触る'},
        [{tone:'amber', title:'現場写真→報告書', s:'登録不要 · 写真→帳票'}, {tone:'amber', title:'出来高・請求突合', s:'GENBA同型'}]
      ) +
      pair(
        {tone:'', en:'タテル', title:'TATERU', para:'主語：週カレンダー', desc:'週の案件カードから工程→完工→請求ドラフト。', cta:'▶ ログインして触る'},
        [{tone:'teal', title:'現場DX', s:'導入前の体感'}, {tone:'amber', title:'安全パトロール', s:'点検チェック'}]
      ) +
      '</div>';
  }

  function renderQuality(){
    return headerHtml() +
      heroHtml('表に出すものを編集する。', 'UIは現行のまま。A級だけ表、B級は「もっと見る」。') +
      '<div class="p-controls"><div class="p-label">業種</div>' + chipsHtml('建設') +
      '<div class="tabs"><span class="tab">desks</span><span class="tab on">shots</span><span class="tab">stories</span><span class="tab">craft</span></div></div>' +
      '<div class="p-body">' +
      '<div class="tier-label"><strong>A · 表に出す（3）</strong><span>品質・導線で厳選</span></div>' +
      '<div class="grid">' +
      card({tone:'amber', badge:'A', en:'建設', title:'現場写真→報告書', para:'写真→帳票', desc:'撮影→整理→提出まで一気通貫。', cta:'▶ 1発で試す'}) +
      card({tone:'amber', badge:'A', en:'GENBA同型', title:'出来高・請求突合', para:'マップ＋フィルム', desc:'現場写真と出来高表を突合。', cta:'▶ 1発で試す'}) +
      card({tone:'amber', badge:'A', en:'建設', title:'安全パトロール', para:'点検チェック', desc:'指摘→是正指示の下書き。', cta:'▶ 1発で試す'}) +
      '</div>' +
      '<div class="more-fake"><div><strong>B · もっと見る（12）</strong><div style="font-size:11.5px;color:var(--muted)">品質・重複・導線が弱いものを格納</div></div><span>開く ▼</span></div>' +
      '</div>';
  }

  function renderDeepLight(){
    return headerHtml() +
      heroHtml('深い机か、軽い体験か。', 'モードは2つだけ。stories / craft は関連から辿る。') +
      '<div class="p-controls"><div class="p-label">業種</div>' + chipsHtml('建設') +
      '<div class="tabs"><span class="tab on">Deep · 触る机</span><span class="tab">Light · 1発体験</span></div></div>' +
      '<div class="p-body"><div class="two-lane">' +
      '<div class="lane-col"><div class="lane-h"><div class="k">DEEP</div><h4>触る机</h4></div><div class="lane-b">' +
      '<div class="card"><div class="thumb amber"></div><div class="card-b"><div class="en">ゲンバ</div><h4>GENBA</h4><span class="para">マップ</span><div class="cta">▶ 触る</div></div></div>' +
      '<div class="card"><div class="thumb"></div><div class="card-b"><div class="en">タテル</div><h4>TATERU</h4><span class="para">週カレンダー</span><div class="cta">▶ 触る</div></div></div>' +
      '</div></div>' +
      '<div class="lane-col"><div class="lane-h"><div class="k">LIGHT</div><h4>1発体験</h4></div><div class="lane-b">' +
      '<div class="card"><div class="thumb amber"></div><div class="card-b"><div class="en">建設</div><h4>写真→報告書</h4><span class="para">登録不要</span><div class="cta">▶ 試す</div></div></div>' +
      '<div class="card"><div class="thumb amber"></div><div class="card-b"><div class="en">同型</div><h4>出来高突合</h4><span class="para">登録不要</span><div class="cta">▶ 試す</div></div></div>' +
      '<div class="card"><div class="thumb amber"></div><div class="card-b"><div class="en">建設</div><h4>安全パト</h4><span class="para">登録不要</span><div class="cta">▶ 試す</div></div></div>' +
      '</div></div></div></div>';
  }

  function renderHero(){
    return headerHtml() +
      heroHtml('まず、この1本。', '編集固定の旗艦を最上段に。下はいつもの棚。') +
      '<div class="p-controls"><div class="p-label">業種</div>' + chipsHtml('建設') + '</div>' +
      '<div class="p-body">' +
      '<div class="hero-flag"><div class="thumb amber"><span class="badge gold">TODAY\'S FLAGSHIP</span></div>' +
      '<div class="card-b"><div class="en">ゲンバ</div><h4>GENBA</h4><span class="para">主語：マップ</span>' +
      '<p class="desc">建設向け旗艦。現場ピンから点検・是正・日報まで一気に触れる。</p>' +
      '<div class="cta">▶ ログインして触る</div></div></div>' +
      '<div class="section-cap">同じ棚のほかの実物</div>' +
      '<div class="grid">' +
      card({tone:'amber', badge:'1発', en:'建設', title:'写真→報告書', para:'軽デモ', cta:'▶ 試す'}) +
      card({tone:'sky', badge:'90日', en:'CASE 01', title:'部品加工メーカー', para:'Case Theater', cta:'▶ スクラブ'}) +
      card({tone:'', badge:'制作物', en:'3D', title:'間取り→3D内見', para:'craft', cta:'▶ 開く'}) +
      '</div></div>';
  }

  function renderCase(){
    return headerHtml() +
      heroHtml('90日の変化から入る。', '似た会社のBefore/Afterを触ってから、机とデモへ。') +
      '<div class="p-body"><div class="case-stage">' +
      '<div class="case-nav">' +
      '<button class="on" type="button"><span class="no">CASE 01</span><span class="tt">部品加工メーカー</span></button>' +
      '<button type="button"><span class="no">CASE 02</span><span class="tt">地域密着の不動産</span></button>' +
      '<button type="button"><span class="no">CASE 03</span><span class="tt">BtoB営業チーム</span></button>' +
      '</div>' +
      '<div class="theater">' +
      '<div class="en">DAY 0 → 90 · SCRUB</div>' +
      '<h4 style="font-size:18px;color:var(--navy);margin:4px 0 2px;">終業後の報告書が、現場で終わるまで</h4>' +
      '<div class="scrub"><i></i></div>' +
      '<div class="ba"><div class="panel before"><div class="l bad">BEFORE</div><div class="line alert"></div><div class="line w80 alert"></div><div class="line w60"></div><div class="desc">終業後+2h / 写真はLINE散在</div></div>' +
      '<div class="panel after"><div class="l good">AFTER · Day 60</div><div class="line ok"></div><div class="line w80 ok"></div><div class="line w60 ok"></div><div class="desc">AI下書き→監督確認→提出</div></div></div>' +
      '<div class="jump"><a class="pri" href="#">GENBAを触る</a><a href="#">写真→報告書デモ</a><a href="#">建設向け入口</a></div>' +
      '</div></div></div>';
  }

  function updateHandoff(){
    var payload = {
      target: 'lab.html',
      chosenConceptId: state.pick,
      chosenConceptName: byId(state.pick).name,
      previewedConceptId: state.active,
      note: state.note || '',
      next: '選ばれた案を lab.html に実装する'
    };
    document.getElementById('handoff-json').textContent = JSON.stringify(payload, null, 2);
  }

  function renderStage(){
    var c = byId(state.active);
    document.getElementById('stage-title').textContent = c.title;
    document.getElementById('stage-desc').textContent = c.desc;
    document.getElementById('stage-tags').innerHTML = c.tags.map(function(t){
      return '<span class="tag ' + t.c + '">' + t.t + '</span>';
    }).join('');
    document.getElementById('frame-url').textContent = 'lab.html · ' + c.id;
    preview.innerHTML = c.render();
    list.querySelectorAll('.concept-btn').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.id === state.active);
    });
    pickSelect.value = state.pick;
    updateHandoff();
  }

  list.innerHTML = CONCEPTS.map(function(c){
    return '<button type="button" class="concept-btn" data-id="' + c.id + '">' +
      '<span class="id">' + c.id.split('-')[0] + '</span>' +
      '<span class="name">' + c.name + '</span>' +
      '<span class="blurb">' + c.blurb + '</span></button>';
  }).join('');

  pickSelect.innerHTML = CONCEPTS.map(function(c){
    return '<option value="' + c.id + '">' + c.name + '</option>';
  }).join('');

  list.addEventListener('click', function(e){
    var btn = e.target.closest('[data-id]');
    if (!btn) return;
    state.active = btn.dataset.id;
    localStorage.setItem('labUxProposalActive', state.active);
    renderStage();
  });

  document.getElementById('save-pick').addEventListener('click', function(){
    state.pick = pickSelect.value;
    state.note = pickNote.value.trim();
    localStorage.setItem('labUxProposalPick', state.pick);
    localStorage.setItem('labUxProposalNote', state.note);
    state.active = state.pick;
    localStorage.setItem('labUxProposalActive', state.active);
    renderStage();
    alert('保存した。下の Handoff JSON を返せば実装に入る。');
  });

  document.getElementById('copy-pick').addEventListener('click', function(){
    state.pick = pickSelect.value;
    state.note = pickNote.value.trim();
    updateHandoff();
    var text = document.getElementById('handoff-json').textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ alert('コピーした'); });
    } else {
      var pre = document.getElementById('handoff-json');
      var range = document.createRange();
      range.selectNodeContents(pre);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      alert('選択したので Cmd+C');
    }
  });

  pickSelect.addEventListener('change', function(){ state.pick = pickSelect.value; updateHandoff(); });
  pickNote.addEventListener('input', function(){ state.note = pickNote.value; updateHandoff(); });

  renderStage();
})();
</script>
</body>
</html>
